version: '3.8'

services:

  # ===================== BANCO DE DADOS =====================
  postgres:
    image: postgres:16-alpine
    container_name: digitalbank-postgres
    environment:
      POSTGRES_DB: digitalbank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - digitalbank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== REDIS (cache) =====================
  redis:
    image: redis:7-alpine
    container_name: digitalbank-redis
    ports:
      - "6379:6379"
    networks:
      - digitalbank-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== KAFKA + ZOOKEEPER =====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: digitalbank-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - digitalbank-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: digitalbank-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - digitalbank-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ===================== LOCALSTACK (AWS S3 local) =====================
  localstack:
    image: localstack/localstack:3.4
    container_name: digitalbank-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    networks:
      - digitalbank-network

  # ===================== APLICAÇÃO =====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digitalbank-app
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digitalbank
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: 3d8f2a1b9c4e7f6a0d5e2b8c3f1a9d4e7b2c5f8a1d3e6b9c2f5a8d1e4b7c0f3
      AWS_S3_BUCKET: digitalbank-receipts
      AWS_REGION: us-east-1
      AWS_ENDPOINT: http://localstack:4566
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - digitalbank-network

volumes:
  postgres_data:
  localstack_data:

networks:
  digitalbank-network:
    driver: bridge
